name: Run Cypress Tests

on:
  workflow_call:
    inputs:
      start:
        description: NPM start command to run
        required: false
        type: string
        default: "npm start"
      env-vars:
        description: JSON string of additional environment variables
        required: false
        type: string
        default: "{}"

jobs:
  validate-caller:
    runs-on: self-hosted
    steps:
      - name: Validate caller repository
        run: |
          ALLOWED="homelabz-eu/infra homelabz-eu/cks-terminal-mgmt homelabz-eu/cks-backend homelabz-eu/cks-frontend"
          if ! echo "$ALLOWED" | grep -qw "${{ github.repository }}"; then
            echo "::error::Unauthorized caller: ${{ github.repository }}"
            exit 1
          fi

  cypress-tests:
    needs: validate-caller
    runs-on: self-hosted
    container:
      image: cypress/included:latest
      options: --user node

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure environment variables
        id: set-env
        run: |
          # Create initial env file with base URL
          echo "CYPRESS_BASE_URL=${{ inputs.app-url }}" > cypress.env
          echo "CYPRESS_INSTALL_BINARY=0" >> cypress.env

          # Debug
          echo "Received environment variables:"
          echo '${{ inputs.env-vars }}'

          # Use Node.js to parse JSON and create environment variables
          node -e '
            const envVars = JSON.parse(`${{ inputs.env-vars }}`);
            const fs = require("fs");
            Object.entries(envVars).forEach(([key, value]) => {
              fs.appendFileSync("cypress.env", `CYPRESS_${key}=${value}\n`);
            });
          '

      - name: NPM install
        run: npm install

      - name: Cypress run
        uses: cypress-io/github-action@v6
        env:
          CYPRESS_BASE_URL: ${{ inputs['app-url'] }}
          CYPRESS_INSTALL_BINARY: 0
        with:
          start: ${{ inputs['start'] }}
          record: false
