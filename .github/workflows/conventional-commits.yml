name: Conventional Commits

on:
  workflow_call:

jobs:
  validate-caller:
    runs-on: self-hosted
    steps:
      - name: Validate caller repository
        run: |
          ALLOWED="homelabz-eu/infra homelabz-eu/cks-terminal-mgmt homelabz-eu/cks-backend homelabz-eu/cks-frontend"
          if ! echo "$ALLOWED" | grep -qw "${{ github.repository }}"; then
            echo "::error::Unauthorized caller: ${{ github.repository }}"
            exit 1
          fi

  check-commit-message:
    needs: validate-caller
    runs-on: self-hosted
    steps:
      - name: Check Commit Message Format
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.RUNNER }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
          requireScope: false
          subjectPattern: ^(?![A-Z]).+$
          subjectPatternError: |
            The subject "{subject}" found in the pull request title "{title}"
            didn't match the configured pattern. Please ensure that the subject
            starts with a lowercase letter.
          wip: true
          validateSingleCommit: true
          validateSingleCommitMatchesPrTitle: true
