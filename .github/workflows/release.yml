name: Release

on:
  workflow_call:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  validate-caller:
    runs-on: self-hosted
    steps:
      - name: Validate caller repository
        run: |
          ALLOWED="homelabz-eu/infra homelabz-eu/cks-terminal-mgmt homelabz-eu/cks-backend homelabz-eu/cks-frontend"
          if ! echo "$ALLOWED" | grep -qw "${{ github.repository }}"; then
            echo "::error::Unauthorized caller: ${{ github.repository }}"
            exit 1
          fi

  release:
    needs: validate-caller
    name: Release
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Install dependencies
        run: npm install -g semantic-release @semantic-release/changelog @semantic-release/git @semantic-release/github@11.0.3 conventional-changelog-conventionalcommits

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.RUNNER }}
        run: npx semantic-release
