name: Build and Push Docker Image
on:
  workflow_call:
    inputs:
      app-context:
        description: Context for the Docker build
        required: true
        type: string
      app-name:
        description: Docker image name
        required: true
        type: string
      app-dockerfile:
        description: Docker image name
        required: false
        type: string
        default: Dockerfile

jobs:
  validate-caller:
    runs-on: self-hosted
    steps:
      - name: Validate caller repository
        run: |
          ALLOWED="homelabz-eu/infra homelabz-eu/cks-terminal-mgmt homelabz-eu/cks-backend homelabz-eu/cks-frontend"
          if ! echo "$ALLOWED" | grep -qw "${{ github.repository }}"; then
            echo "::error::Unauthorized caller: ${{ github.repository }}"
            exit 1
          fi

  build-and-push:
    needs: validate-caller
    runs-on: self-hosted-buildkit
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to Harbor
        run: |
          mkdir -p ~/.docker
          echo "{\"auths\":{\"registry.homelabz.eu\":{\"auth\":\"$(echo -n "admin:${HARBOR_KEY}" | base64)\"}}}" > ~/.docker/config.json

      - name: Build and Push Docker Image
        env:
          REGISTRY: registry.homelabz.eu
          IMAGE: library/${{ inputs.app-name }}
          SHA: ${{ github.sha }}
        run: |
          buildctl build \
            --frontend dockerfile.v0 \
            --local context=${{ inputs.app-context }} \
            --local dockerfile=${{ inputs.app-context }} \
            --opt filename=${{ inputs.app-dockerfile }} \
            --output "type=image,name=${REGISTRY}/${IMAGE}:${SHA},push=true"
          buildctl build \
            --frontend dockerfile.v0 \
            --local context=${{ inputs.app-context }} \
            --local dockerfile=${{ inputs.app-context }} \
            --opt filename=${{ inputs.app-dockerfile }} \
            --output "type=image,name=${REGISTRY}/${IMAGE}:latest,push=true"
