name: Deploy Kustomize Workload

on:
  workflow_call:
    inputs:
      kustomize-dir:
        description: Path to the directory containing the Kustomize manifests
        required: true
        type: string
      context:
        description: Kubernetes context to use (optional)
        required: false
        type: string
        default: ""
      app-name:
        description: Name of the application (used in the Kustomize manifest)
        required: true
        type: string

jobs:
  validate-caller:
    runs-on: self-hosted
    steps:
      - name: Validate caller repository
        run: |
          ALLOWED="homelabz-eu/infra homelabz-eu/cks-terminal-mgmt homelabz-eu/cks-backend homelabz-eu/cks-frontend"
          if ! echo "$ALLOWED" | grep -qw "${{ github.repository }}"; then
            echo "::error::Unauthorized caller: ${{ github.repository }}"
            exit 1
          fi

  deploy-kustomize:
    needs: validate-caller
    runs-on: self-hosted

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Deploy
        run: |
          cp /home/runner/.kube/config /home/runner/config
          export KUBECONFIG=/home/runner/config
          kubectl config view
          kubectl config get-contexts
          kubectl config use-context ${{ inputs.context }}
          kubectl kustomize ${{ inputs.kustomize-dir }} \
            | sed "s|latest|${{ github.sha }}|" \
            > manifest.yaml
          cat manifest.yaml
          kubectl config current-context
          kubectl apply -f manifest.yaml
          kubectl rollout status deployment/${{ inputs.app-name }} -n default --timeout=5m || exit 1
